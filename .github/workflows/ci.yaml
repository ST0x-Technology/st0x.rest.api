name: CI
on:
  push:
    branches:
      - main
    paths-ignore:
      - "AGENTS.md"
      - "README*"
  pull_request:
    paths-ignore:
      - "AGENTS.md"
      - "README*"
concurrency:
  group: ${{ github.ref }}-ci
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
permissions:
  contents: read
jobs:
  rust-validation:
    name: rust ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: test+static 1 of 4
            cache_target: test
            partition: 1
            run_static: "true"
          - name: test 2 of 4
            cache_target: test
            partition: 2
            run_static: "false"
          - name: test 3 of 4
            cache_target: test
            partition: 3
            run_static: "false"
          - name: test 4 of 4
            cache_target: test
            partition: 4
            run_static: "false"
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TARGET_DIR: target/${{ matrix.cache_target }}
      COMMIT_SHA: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Compute submodule cache key
        id: sub-key
        run: echo "hash=$(git submodule status | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Cache submodules
        id: cache-sub
        uses: actions/cache@v5
        with:
          path: |
            lib/
            .git/modules/
          key: submodules-${{ steps.sub-key.outputs.hash }}
          restore-keys: submodules-
      - name: Checkout submodules
        run: |
          if [ "${{ steps.cache-sub.outputs.cache-hit }}" = "true" ]; then
            echo "Cache hit - trying no-fetch checkout"
            git submodule update --init --recursive --no-fetch || {
              echo "no-fetch failed - falling back to full fetch"
              git submodule update --init --recursive
            }
          else
            echo "Cache miss - full submodule fetch"
            git submodule update --init --recursive
          fi
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            accept-flake-config = true
            fallback = true
            keep-env-derivations = true
            keep-outputs = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      - name: Cache Solidity artifacts
        id: cache-sol
        uses: actions/cache@v5
        with:
          path: |
            lib/**/cache/
            lib/**/out/
          key: sol-artifacts-${{ hashFiles('.gitmodules', 'flake.lock', 'lib/**/*.sol', 'lib/**/foundry.toml', 'lib/**/remappings.txt') }}
          restore-keys: sol-artifacts-
      - name: Build Solidity artifacts
        if: steps.cache-sol.outputs.cache-hit != 'true'
        run: nix run .#prepSolArtifacts
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: rust-${{ github.workflow }}-${{ matrix.cache_target }}-${{ matrix.partition }}
      - name: ${{ matrix.name }}
        run: |
          set -euxo pipefail
          if [ "${{ matrix.run_static }}" = "true" ]; then
            nix develop -c rainix-rs-static
          fi
          nix develop -c cargo nextest run --workspace --partition hash:${{ matrix.partition }}/4
  rust-checks:
    name: rust-checks
    needs: rust-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check rust validation
        run: |
          if [ "${{ needs.rust-validation.result }}" != "success" ]; then
            echo "rust validation failed"
            exit 1
          fi
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            accept-flake-config = true
            fallback = true
            keep-env-derivations = true
            keep-outputs = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: rainlanguage
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          useDaemon: false
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 8G
      - name: Build docs
        run: nix build .#st0x-docs
